<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football Live Scores</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Football Live Scores</h1>
        <p class="subtitle">Track match updates at a glance.</p>
      </header>
      <section class="auth-panel" aria-label="User authentication">
        <h2>Account</h2>
        <form id="signup-form" class="auth-form">
          <label>
            Username
            <input id="signup-username" name="username" type="text" autocomplete="username" required minlength="3" />
          </label>
          <label>
            Password
            <input id="signup-password" name="password" type="password" autocomplete="new-password" required minlength="6" />
          </label>
          <button type="submit">Sign Up</button>
        </form>
        <form id="login-form" class="auth-form">
          <label>
            Username
            <input id="login-username" name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            Password
            <input id="login-password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Log In</button>
        </form>
        <div class="session-row">
          <p id="auth-status" class="auth-status">Not logged in.</p>
          <button id="logout" type="button" class="secondary-button" hidden>Log Out</button>
        </div>
      </section>
      <div class="toolbar">
        <p id="last-updated" class="last-updated">Loading live scores…</p>
        <button id="refresh" type="button">Refresh Scores</button>
      </div>
      <section id="scores" class="scores" aria-live="polite"></section>
    </main>

    <template id="score-card-template">
      <article class="score-card">
        <p class="league"></p>
        <p class="teams"></p>
        <p class="score-line">
          <span class="score"></span>
          <span class="status"></span>
        </p>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
